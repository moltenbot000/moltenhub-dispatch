name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Docker tag to promote to latest-* release tags
        required: true
        default: vnext
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  promote-harness-variants:
    name: Promote image to latest-${{ matrix.harness }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - harness: codex
            source_suffix: ""
            publish_default_tag: "true"
          - harness: claude
            source_suffix: "-claude"
            publish_default_tag: "false"
          - harness: auggie
            source_suffix: "-auggie"
            publish_default_tag: "false"
          - harness: pi
            source_suffix: "-pi"
            publish_default_tag: "false"
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote existing image
        run: |
          TAG_ARGS="--tag moltenai/moltenhub-dispatch:latest-${{ matrix.harness }}"
          if [ "${{ matrix.publish_default_tag }}" = "true" ]; then
            TAG_ARGS="${TAG_ARGS} --tag moltenai/moltenhub-dispatch:latest"
          fi

          docker buildx imagetools create \
            ${TAG_ARGS} \
            moltenai/moltenhub-dispatch:${{ github.event.inputs.source_tag }}${{ matrix.source_suffix }}
