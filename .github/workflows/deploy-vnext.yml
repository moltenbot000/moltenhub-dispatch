name: deploy-vnext

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  publish:
    name: Publish vnext Docker image (${{ matrix.harness }})
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - harness: codex
            npm_package: '@openai/codex@latest'
            tag_suffix: codex
            publish_default_tags: 'true'
          - harness: claude
            npm_package: '@anthropic-ai/claude-code@latest'
            tag_suffix: claude
            publish_default_tags: 'false'
          - harness: auggie
            npm_package: '@augmentcode/auggie@latest'
            tag_suffix: auggie
            publish_default_tags: 'false'
          - harness: pi
            npm_package: '@mariozechner/pi-coding-agent@latest'
            tag_suffix: pi
            publish_default_tags: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: moltenai
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate date build tag
        id: version
        run: echo "tag=$(date -u +'%Y.%m.%d').${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        run: |
          TAGS="moltenai/moltenhub-dispatch:vnext-${{ matrix.tag_suffix }},moltenai/moltenhub-dispatch:${{ steps.version.outputs.tag }}-${{ matrix.tag_suffix }}"
          if [ "${{ matrix.publish_default_tags }}" = "true" ]; then
            TAGS="${TAGS},moltenai/moltenhub-dispatch:vnext,moltenai/moltenhub-dispatch:${{ steps.version.outputs.tag }}"
          fi
          echo "value=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            AGENT_HARNESS=${{ matrix.harness }}
            AGENT_NPM_PACKAGE=${{ matrix.npm_package }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
