name: moltenhub-ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'moltenhub-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          case "$PR_TITLE" in
            moltenhub-*)
              ;;
            *)
              echo "Pull request title must start with 'moltenhub-'. Got: $PR_TITLE" >&2
              exit 1
              ;;
          esac

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate repository
        run: ./scripts/validate-repo.sh

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...
