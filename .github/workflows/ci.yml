name: moltenhub-ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'moltenhub-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate repository
        run: ./scripts/validate-repo.sh

      - name: Run tests
        run: go test ./...

      - name: Verify build
        run: go build ./...
